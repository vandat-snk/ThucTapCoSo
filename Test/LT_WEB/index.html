<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Responsive</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <header class="bg-blue-600 text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      
      <h1 class="font-semibold text-lg">MySite</h1>

      <nav class="hidden md:flex space-x-6">
        <a href="#" class="hover:underline">Home</a>
        <a href="#" class="hover:underline">About</a>
        <a href="#" class="hover:underline">Contact</a>
      </nav>

      <button class="md:hidden text-xl">☰</button>
    </div>
  </header>

  <section class="flex items-center justify-center min-h-[80vh] px-4">
    
    <div class="flex flex-col md:flex-row items-center gap-8 md:gap-12 text-center md:text-left">
      
      <div class="w-60 h-60 md:w-60 md:h-60 rounded-full">
        <img src="/image/R.png" alt="">
      </div>

      <div>
        <h1 class="text-2xl md:text-4xl font-bold mb-2">
          Tailwind CSS
        </h1>

        <h2 class="text-lg md:text-xl font-semibold mb-2">
          Learn Tailwind CSS
        </h2>

        <p class="text-gray-600 mb-4 max-w-md">
          Build responsive layouts quickly with utility-first CSS.
        </p>

        <button class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700 transition">
          Get Started
        </button>
      </div>

    </div>

  </section>

</body>
</html>
